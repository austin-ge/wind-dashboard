<!DOCTYPE html>
<html lang="en" style="color-scheme: dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skydive Midwest &mdash; Wind Board</title>
  <meta name="theme-color" content="#0a0b10" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;600;700&family=Azeret+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0a0b10;
      --surface: rgba(255, 255, 255, 0.03);
      --surface-raised: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.06);
      --border-accent: rgba(255, 255, 255, 0.1);
      --text: #e8e4dd;
      --text-bright: #fff;
      --muted: #6b7280;
      --dim: #3d4250;
      --avg: #5eead4;
      --gust: #fbbf24;
      --good: #34d399;
      --warn: #f87171;
      --flat: #6b7280;
      --font-body: 'Familjen Grotesk', system-ui, sans-serif;
      --font-mono: 'Azeret Mono', 'SF Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      opacity: 0.35;
      pointer-events: none;
      z-index: 9999;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    }

    /* Ambient glow */
    body::after {
      content: "";
      position: fixed;
      top: -40%;
      left: 50%;
      transform: translateX(-50%);
      width: 120%;
      height: 60%;
      background: radial-gradient(ellipse, rgba(94, 234, 212, 0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .sr-only {
      position: absolute;
      left: -9999px;
      top: auto;
      width: 1px;
      height: 1px;
      overflow: hidden;
    }

    /* --- Layout --- */

    .dashboard {
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px 24px;
      display: grid;
      gap: 20px;
    }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px 8px;
    }

    .site-title {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .site-title span {
      color: var(--avg);
    }

    .header-meta {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--dim);
      letter-spacing: 0.04em;
    }

    .top-grid {
      display: grid;
      grid-template-columns: minmax(340px, 440px) 1fr;
      gap: 20px;
      align-items: stretch;
    }

    /* --- Cards --- */

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      animation: cardIn 0.6s ease both;
    }

    .card:nth-child(1) { animation-delay: 0s; }
    .card:nth-child(2) { animation-delay: 0.08s; }
    .table-card { animation-delay: 0.16s; }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-inner { padding: 28px; }

    /* --- Section Labels --- */

    .section-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 22px;
    }

    .section-label span {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(94, 234, 212, 0.15);
      background: rgba(94, 234, 212, 0.06);
      color: var(--avg);
      font-family: var(--font-mono);
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .badge::before {
      content: "";
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--avg);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* --- Live Speed --- */

    .live-card {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .live-speed-wrap {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 28px;
    }

    .live-speed {
      font-family: var(--font-mono);
      font-size: clamp(4.5rem, 12vw, 7.5rem);
      line-height: 0.85;
      font-weight: 700;
      letter-spacing: -0.05em;
      color: var(--text-bright);
      font-variant-numeric: tabular-nums;
    }

    .live-unit {
      font-family: var(--font-mono);
      font-size: clamp(0.9rem, 1.8vw, 1.2rem);
      color: var(--dim);
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* --- Compass --- */

    .live-details {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 24px;
      align-items: center;
      margin-top: auto;
    }

    .compass {
      width: 130px;
      height: 130px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,255,255,0.02) 0%, transparent 70%);
      border: 1px solid var(--border-accent);
      display: grid;
      place-items: center;
      position: relative;
      flex-shrink: 0;
    }

    .compass-ring {
      position: absolute;
      inset: 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* Crosshairs */
    .compass::before,
    .compass::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, 0.04);
    }

    .compass::before { width: 1px; height: 75%; }
    .compass::after { height: 1px; width: 75%; }

    /* Cardinal labels */
    .compass-n, .compass-e, .compass-s, .compass-w {
      position: absolute;
      font-family: var(--font-mono);
      font-size: 0.56rem;
      font-weight: 600;
      color: var(--dim);
      letter-spacing: 0.05em;
    }

    .compass-n { top: 6px; left: 50%; transform: translateX(-50%); color: var(--avg); }
    .compass-s { bottom: 6px; left: 50%; transform: translateX(-50%); }
    .compass-e { right: 8px; top: 50%; transform: translateY(-50%); }
    .compass-w { left: 8px; top: 50%; transform: translateY(-50%); }

    /* Tick marks */
    .compass-ticks {
      position: absolute;
      inset: 0;
      border-radius: 50%;
    }

    .compass-ticks::before,
    .compass-ticks::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, 0.06);
    }

    .compass-ticks::before {
      width: 1px;
      height: 75%;
      top: 12.5%;
      left: 50%;
      transform: rotate(45deg);
      transform-origin: center;
    }

    .compass-ticks::after {
      width: 1px;
      height: 75%;
      top: 12.5%;
      left: 50%;
      transform: rotate(-45deg);
      transform-origin: center;
    }

    .arrow-wrap {
      width: 60px;
      height: 60px;
      transform: rotate(0deg);
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1;
    }

    .dir-label {
      font-family: var(--font-mono);
      font-size: clamp(1rem, 2.2vw, 1.4rem);
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }

    /* --- Data Chips --- */

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .meta-chip {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      font-family: var(--font-mono);
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dim);
      min-width: 0;
    }

    .meta-chip strong {
      display: block;
      font-family: var(--font-mono);
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 600;
      margin-top: 4px;
      letter-spacing: 0;
      text-transform: none;
      font-variant-numeric: tabular-nums;
    }

    .subtle {
      margin-top: 16px;
      font-family: var(--font-mono);
      color: var(--dim);
      font-size: 0.65rem;
      letter-spacing: 0.04em;
    }

    /* --- Chart --- */

    .chart-card {
      min-height: 360px;
      display: flex;
      flex-direction: column;
    }

    .chart-card .card-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .chart-wrap {
      position: relative;
      flex: 1;
      min-height: 200px;
      margin-top: 8px;
    }

    .chart-empty,
    .table-empty {
      display: grid;
      place-items: center;
      min-height: 200px;
      color: var(--dim);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      text-align: center;
      border: 1px dashed rgba(255, 255, 255, 0.06);
      border-radius: 12px;
    }

    /* --- Last Window --- */

    /* --- Spot --- */

    .spot-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .spot-row.hidden { display: none; }

    .spot-label {
      width: 100%;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 2px;
    }

    .last-window {
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(94, 234, 212, 0.04);
      border: 1px solid rgba(94, 234, 212, 0.1);
      border-radius: 10px;
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--muted);
      display: none;
    }

    .last-window.visible { display: flex; flex-wrap: wrap; align-items: baseline; gap: 6px 14px; }

    .last-window-label {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
      width: 100%;
      margin-bottom: 2px;
    }

    .last-window-val {
      font-weight: 600;
      font-size: 0.82rem;
    }

    .last-window-val.avg { color: var(--avg); }
    .last-window-val.gust { color: var(--gust); }
    .last-window-time { color: var(--dim); }

    /* --- Table --- */

    .table-card .card-inner { padding-bottom: 12px; }

    .table-scroll {
      overflow: auto;
      border-top: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    th, td {
      padding: 14px 20px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      font-variant-numeric: tabular-nums;
    }

    th {
      color: var(--dim);
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
      background: rgba(0, 0, 0, 0.3);
      position: sticky;
      top: 0;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    td { color: var(--text); }

    tbody tr { transition: background 0.15s ease; }
    tbody tr:hover { background: rgba(94, 234, 212, 0.03); }

    tbody tr.current {
      background: rgba(94, 234, 212, 0.05);
      border-left: 2px solid var(--avg);
    }

    .value-avg {
      color: var(--avg);
      font-weight: 600;
    }

    .value-gust {
      color: var(--gust);
      font-weight: 600;
    }

    .trend {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
    }

    .trend.up { color: var(--warn); }
    .trend.down { color: var(--good); }
    .trend.flat { color: var(--flat); }

    /* --- Title Row --- */

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .title-row h2 {
      margin: 0;
      font-size: clamp(1.1rem, 1.8vw, 1.4rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text-bright);
    }

    .title-note {
      font-family: var(--font-mono);
      color: var(--dim);
      font-size: 0.68rem;
      letter-spacing: 0.04em;
    }

    /* --- Responsive --- */

    @media (max-width: 980px) {
      .top-grid { grid-template-columns: 1fr; }
      .chart-wrap { height: 260px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .arrow-wrap { transition: none; }
      tbody tr { transition: none; }
      .card { animation: none; }
      .badge::before { animation: none; }
    }

    @media (max-width: 640px) {
      .dashboard { padding: 16px; gap: 14px; }
      .card-inner { padding: 20px; }
      .live-details {
        grid-template-columns: 1fr;
        justify-items: start;
      }
      .compass { width: 110px; height: 110px; }
      th, td { padding: 12px 14px; }
      table { min-width: 600px; }
      .site-header { flex-direction: column; align-items: flex-start; gap: 4px; }
    }
  </style>
</head>
<body>
  <a href="#liveSpeed" class="sr-only">Skip to content</a>
  <main class="dashboard">
    <h1 class="sr-only">Skydive Midwest Wind Board</h1>

    <header class="site-header">
      <div class="site-title">Skydive <span>Midwest</span> &mdash; Wind Board</div>
      <div class="header-meta" id="updatedAgo">Last updated &mdash;</div>
    </header>

    <section class="top-grid">
      <article class="card live-card">
        <div class="card-inner">
          <div class="section-label">
            <span>Live Wind</span>
            <span class="badge">Live</span>
          </div>

          <div class="live-speed-wrap">
            <div class="live-speed" id="liveSpeed">&mdash;</div>
            <div class="live-unit">mph</div>
          </div>

          <div class="live-details">
            <div class="compass" aria-label="Wind direction compass">
              <div class="compass-ring"></div>
              <div class="compass-ticks"></div>
              <span class="compass-n">N</span>
              <span class="compass-e">E</span>
              <span class="compass-s">S</span>
              <span class="compass-w">W</span>
              <div class="arrow-wrap" id="windArrow">
                <svg viewBox="0 0 100 100" width="60" height="60" aria-hidden="true">
                  <defs>
                    <linearGradient id="arrowGradient" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stop-color="#a7f3d0" />
                      <stop offset="100%" stop-color="#5eead4" />
                    </linearGradient>
                  </defs>
                  <circle cx="50" cy="50" r="5" fill="rgba(255,255,255,0.5)"></circle>
                  <path d="M50 10 L62 50 L50 44 L38 50 Z" fill="url(#arrowGradient)" stroke="rgba(167,243,208,0.4)" stroke-width="1" />
                  <path d="M50 90 L56 56 L50 60 L44 56 Z" fill="rgba(255,255,255,0.08)" />
                </svg>
              </div>
            </div>

            <div>
              <div class="dir-label" id="dirLabel">Waiting for data&hellip;</div>
              <div class="meta-row">
                <div class="meta-chip">
                  Gust
                  <strong id="gustValue">&mdash;</strong>
                </div>
                <div class="meta-chip">
                  Temp
                  <strong id="tempValue">&mdash;</strong>
                </div>
                <div class="meta-chip">
                  DA
                  <strong id="densityAltValue">&mdash;</strong>
                </div>
                <div class="meta-chip">
                  Clouds
                  <strong id="cloudBaseValue">&mdash;</strong>
                </div>
                <div class="meta-chip">
                  Baro
                  <strong id="pressureValue">&mdash;</strong>
                </div>
              </div>
              <div class="spot-row hidden" id="spotRow">
                <div class="spot-label">Spot</div>
                <div class="meta-chip">
                  Heading
                  <strong id="spotHeading">&mdash;</strong>
                </div>
                <div class="meta-chip">
                  Run
                  <strong id="spotRun">&mdash;</strong>
                </div>
              </div>
              <div class="last-window" id="lastWindow"></div>
            </div>
          </div>
        </div>
      </article>

      <article class="card chart-card">
        <div class="card-inner">
          <div class="title-row">
            <div>
              <div class="section-label" style="margin-bottom: 6px;">
                <span>Today</span>
              </div>
              <h2>Wind Trend</h2>
            </div>
            <div class="title-note" id="chartRange">Waiting for window data&hellip;</div>
          </div>
          <div id="chartState" class="chart-wrap">
            <canvas id="windChart" role="img" aria-label="Wind trend chart showing average wind speed and gusts over time"></canvas>
          </div>
        </div>
      </article>
    </section>

    <section class="card table-card">
      <div class="card-inner">
        <div class="title-row">
          <div>
            <div class="section-label" style="margin-bottom: 6px;">
              <span>30-Min Windows</span>
            </div>
            <h2>Operations Log</h2>
          </div>
          <div class="title-note" id="windowCount">No window data yet</div>
        </div>
      </div>
      <div class="table-scroll" id="tableContainer"></div>
    </section>
  </main>

  <script>
    const API_BASE = '';

    function cardinal(deg) {
      const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
      return dirs[Math.round(((deg % 360) + 360) % 360 / 22.5) % 16];
    }

    const state = {
      weather: null,
      windows: [],
      spot: null,
      chart: null,
      lastWeatherFetch: null,
      weatherError: false,
      windowsError: false,
    };

    const el = {
      liveSpeed: document.getElementById('liveSpeed'),
      windArrow: document.getElementById('windArrow'),
      dirLabel: document.getElementById('dirLabel'),
      gustValue: document.getElementById('gustValue'),
      tempValue: document.getElementById('tempValue'),
      densityAltValue: document.getElementById('densityAltValue'),
      cloudBaseValue: document.getElementById('cloudBaseValue'),
      pressureValue: document.getElementById('pressureValue'),
      updatedAgo: document.getElementById('updatedAgo'),
      chartRange: document.getElementById('chartRange'),
      chartState: document.getElementById('chartState'),
      windChart: document.getElementById('windChart'),
      tableContainer: document.getElementById('tableContainer'),
      windowCount: document.getElementById('windowCount'),
      lastWindow: document.getElementById('lastWindow'),
      spotRow: document.getElementById('spotRow'),
      spotHeading: document.getElementById('spotHeading'),
      spotRun: document.getElementById('spotRun'),
    };

    const fmtInt = (value) => Number.isFinite(Number(value)) ? Math.round(Number(value)) : null;
    const fmtOne = (value) => Number.isFinite(Number(value)) ? Number(value).toFixed(1) : null;

    function safeDeg(value) {
      const num = Number(value);
      return Number.isFinite(num) ? ((num % 360) + 360) % 360 : null;
    }

    function formatDir(deg) {
      const normalized = safeDeg(deg);
      return normalized == null ? '\u2014' : `${cardinal(normalized)} \u2022 ${Math.round(normalized)}\u00B0`;
    }

    function formatTimeRange(start, end) {
      const opts = { hour: 'numeric', minute: '2-digit' };
      return `${new Date(start).toLocaleTimeString([], opts)}\u2013${new Date(end).toLocaleTimeString([], opts)}`;
    }

    function formatShortTime(dateLike) {
      return new Date(dateLike).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    }

    function timeSince(dateLike) {
      if (!dateLike) return 'Last updated \u2014';
      const seconds = Math.max(0, Math.floor((Date.now() - new Date(dateLike).getTime()) / 1000));
      if (seconds < 60) return `Updated ${seconds}s ago`;
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `Updated ${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      return `Updated ${hours}h ${minutes % 60}m ago`;
    }

    function getTrend(current, previous) {
      if (!Number.isFinite(current) || !Number.isFinite(previous)) {
        return { symbol: '\u2192', label: 'steady', className: 'flat' };
      }
      const delta = current - previous;
      if (Math.abs(delta) <= 1) return { symbol: '\u2192', label: 'steady', className: 'flat' };
      if (delta > 1) return { symbol: '\u2191', label: `${Math.round(delta)} mph`, className: 'up' };
      return { symbol: '\u2193', label: `${Math.round(Math.abs(delta))} mph`, className: 'down' };
    }

    async function fetchJson(url) {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    async function refreshWeather() {
      try {
        const data = await fetchJson(`${API_BASE}/api/weather`);
        state.weather = data;
        state.lastWeatherFetch = new Date();
        state.weatherError = false;
      } catch (error) {
        state.weatherError = true;
        console.error('Weather fetch failed:', error);
      }
      renderWeather();
    }

    async function refreshWindows() {
      try {
        const data = await fetchJson(`${API_BASE}/api/windows`);
        state.windows = Array.isArray(data) ? data : [];
        state.windowsError = false;
      } catch (error) {
        state.windowsError = true;
        console.error('Windows fetch failed:', error);
      }
      renderWindows();
      renderChart();
    }

    async function refreshSpot() {
      try {
        const data = await fetchJson(`${API_BASE}/api/spot`);
        if (data && data.spot) {
          state.spot = data;
        }
      } catch (error) {
        // Spot data is optional — fail silently
      }
      renderSpot();
    }

    function renderSpot() {
      const spot = state.spot?.spot;
      if (!spot) {
        el.spotRow.classList.add('hidden');
        return;
      }
      el.spotRow.classList.remove('hidden');
      const heading = spot.headingDeg;
      const offset = spot.offsetMiles;
      if (heading != null && offset != null) {
        const sign = offset >= 0 ? '+' : '';
        el.spotHeading.textContent = `${Math.round(heading)}\u00B0@${sign}${offset.toFixed(2)}`;
      } else if (heading != null) {
        el.spotHeading.textContent = `${Math.round(heading)}\u00B0`;
      } else {
        el.spotHeading.textContent = '\u2014';
      }
      const gs = spot.groundSpeedKts;
      const sep = spot.separationSeconds;
      if (gs != null && sep != null) {
        el.spotRun.textContent = `${Math.round(gs)} kts / ${sep}s`;
      } else if (gs != null) {
        el.spotRun.textContent = `${Math.round(gs)} kts`;
      } else {
        el.spotRun.textContent = '\u2014';
      }
    }

    function renderWeather() {
      const weather = state.weather;
      const speed = fmtInt(weather?.windspeedmph);
      const gust = fmtInt(weather?.windgustmph);
      const windDir = safeDeg(weather?.winddir);
      const temp = fmtInt(weather?.tempf);
      const densityAlt = fmtInt(weather?.density_altitude_ft);
      const cloudBase = fmtInt(weather?.cloud_base_agl_ft);
      const pressure = fmtOne(weather?.baromabsin);

      el.liveSpeed.textContent = speed == null ? '\u2014' : `${speed}`;
      el.gustValue.textContent = gust == null ? '\u2014' : `${gust} mph`;
      el.tempValue.textContent = temp == null ? '\u2014' : `${temp}\u00B0F`;
      el.densityAltValue.textContent = densityAlt == null ? '\u2014' : `${densityAlt.toLocaleString()} ft`;
      el.cloudBaseValue.textContent = cloudBase == null ? '\u2014' : `${cloudBase.toLocaleString()} ft AGL`;
      el.pressureValue.textContent = pressure == null ? '\u2014' : `${pressure} inHg`;
      el.dirLabel.textContent = weather ? formatDir(windDir) : (state.weatherError ? 'Data unavailable' : 'Waiting for data\u2026');
      el.windArrow.style.transform = `rotate(${windDir ?? 0}deg)`;
      el.updatedAgo.textContent = timeSince(weather?.received_at || state.lastWeatherFetch);
    }

    function renderChart() {
      const windows = [...state.windows]
        .filter(w => w?.window_start && w?.window_end)
        .sort((a, b) => new Date(a.window_start) - new Date(b.window_start));

      if (!windows.length) {
        if (state.chart) {
          state.chart.destroy();
          state.chart = null;
        }
        el.chartState.innerHTML = '<div class="chart-empty">Waiting for data\u2026</div>';
        el.chartRange.textContent = state.windowsError ? 'Window data unavailable' : 'Waiting for window data\u2026';
        return;
      }

      if (!el.windChart || !document.getElementById('windChart')) {
        el.chartState.innerHTML = '<canvas id="windChart"></canvas>';
        el.windChart = document.getElementById('windChart');
      }

      const labels = windows.map(w => formatShortTime(w.window_start));
      const avgData = windows.map(w => Number(w.avg_windspeed_mph ?? null));
      const gustData = windows.map(w => Number(w.max_gust_mph ?? null));
      const start = windows[0].window_start;
      const end = windows[windows.length - 1].window_end;
      el.chartRange.textContent = `${formatShortTime(start)} to ${formatShortTime(end)}`;

      const config = {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: 'Avg Wind',
              data: avgData,
              borderColor: '#5eead4',
              backgroundColor: 'rgba(94, 234, 212, 0.08)',
              pointRadius: 2,
              pointHoverRadius: 5,
              pointBackgroundColor: '#5eead4',
              tension: 0.3,
              borderWidth: 2,
              fill: true,
            },
            {
              label: 'Gust',
              data: gustData,
              borderColor: '#fbbf24',
              backgroundColor: 'rgba(251, 191, 36, 0.05)',
              pointRadius: 2,
              pointHoverRadius: 5,
              pointBackgroundColor: '#fbbf24',
              tension: 0.3,
              borderWidth: 2,
              fill: false,
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              labels: {
                color: '#6b7280',
                usePointStyle: true,
                boxWidth: 6,
                padding: 20,
                font: { family: "'Azeret Mono', monospace", size: 11 }
              }
            },
            tooltip: {
              backgroundColor: 'rgba(10, 11, 16, 0.95)',
              borderColor: 'rgba(255,255,255,0.08)',
              borderWidth: 1,
              titleColor: '#e8e4dd',
              bodyColor: '#6b7280',
              titleFont: { family: "'Azeret Mono', monospace", size: 12 },
              bodyFont: { family: "'Azeret Mono', monospace", size: 11 },
              padding: 12,
              cornerRadius: 8,
              callbacks: {
                label: (ctx) => `${ctx.dataset.label}: ${fmtOne(ctx.parsed.y) ?? '\u2014'} mph`
              }
            }
          },
          scales: {
            x: {
              ticks: {
                color: '#3d4250',
                maxRotation: 0,
                autoSkip: true,
                font: { family: "'Azeret Mono', monospace", size: 10 }
              },
              grid: { color: 'rgba(255, 255, 255, 0.03)' }
            },
            y: {
              beginAtZero: true,
              ticks: {
                color: '#3d4250',
                font: { family: "'Azeret Mono', monospace", size: 10 },
                callback: (value) => `${value}`
              },
              grid: { color: 'rgba(255, 255, 255, 0.03)' }
            }
          }
        }
      };

      if (state.chart) {
        state.chart.data = config.data;
        state.chart.options = config.options;
        state.chart.update();
      } else {
        state.chart = new Chart(el.windChart.getContext('2d'), config);
      }
    }

    function renderWindows() {
      const windows = [...state.windows]
        .filter(w => w?.window_start && w?.window_end)
        .sort((a, b) => new Date(b.window_start) - new Date(a.window_start));

      el.windowCount.textContent = windows.length
        ? `${windows.length} windows`
        : (state.windowsError ? 'Data unavailable' : 'No data yet');

      // Show last completed window in live card
      const now = Date.now();
      const lastCompleted = windows.find(w => new Date(w.window_end).getTime() <= now);
      if (lastCompleted) {
        const avg = Math.round(Number(lastCompleted.avg_windspeed_mph));
        const gust = Math.round(Number(lastCompleted.max_gust_mph));
        const timeRange = formatTimeRange(lastCompleted.window_start, lastCompleted.window_end);
        el.lastWindow.innerHTML = `
          <div class="last-window-label">Last 30-Min Window</div>
          <span class="last-window-val avg">${avg} mph avg</span>
          <span class="last-window-val gust">${gust} mph gust</span>
          <span class="last-window-time">${timeRange}</span>`;
        el.lastWindow.classList.add('visible');
      } else {
        el.lastWindow.classList.remove('visible');
      }

      if (!windows.length) {
        el.tableContainer.innerHTML = '<div class="table-empty">Waiting for data\u2026</div>';
        return;
      }

      const chronological = [...windows].reverse();
      const prevMap = new Map();
      chronological.forEach((window, index) => {
        prevMap.set(window.window_start, chronological[index - 1] || null);
      });

      const rows = windows.map((window, index) => {
        const prev = prevMap.get(window.window_start);
        const avg = Number(window.avg_windspeed_mph);
        const gust = Number(window.max_gust_mph);
        const dir = safeDeg(window.avg_winddir);
        const trend = getTrend(avg, prev ? Number(prev.avg_windspeed_mph) : NaN);

        return `
          <tr class="${index === 0 ? 'current' : ''}">
            <td>${formatTimeRange(window.window_start, window.window_end)}</td>
            <td class="value-avg">${Number.isFinite(avg) ? `${Math.round(avg)} mph` : '\u2014'}</td>
            <td class="value-gust">${Number.isFinite(gust) ? `${Math.round(gust)} mph` : '\u2014'}</td>
            <td>${formatDir(dir)}</td>
            <td>
              <span class="trend ${trend.className}">${trend.symbol} ${trend.label}</span>
            </td>
          </tr>`;
      }).join('');

      el.tableContainer.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Avg</th>
              <th>Gust</th>
              <th>Direction</th>
              <th>Trend</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function startUpdatedTicker() {
      renderWeather();
      setInterval(() => renderWeather(), 1000);
    }

    async function init() {
      renderWeather();
      renderWindows();
      await Promise.all([refreshWeather(), refreshWindows(), refreshSpot()]);
      setInterval(refreshWeather, 5000);
      setInterval(refreshWindows, 30000);
      setInterval(refreshSpot, 5 * 60 * 1000); // 5 minutes
      startUpdatedTicker();
    }

    init();
  </script>
</body>
</html>
