<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dropzone Wind Board</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --card-2: #162133;
      --border: rgba(148, 163, 184, 0.15);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --avg: #38bdf8;
      --gust: #fb923c;
      --good: #22c55e;
      --down: #ef4444;
      --flat: #94a3b8;
      --shadow: 0 18px 45px rgba(2, 6, 23, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.08), transparent 30%),
        linear-gradient(180deg, #0b1220, var(--bg));
      color: var(--text);
      min-height: 100vh;
    }

    .dashboard {
      max-width: 1440px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      gap: 20px;
    }

    .top-grid {
      display: grid;
      grid-template-columns: minmax(320px, 420px) 1fr;
      gap: 20px;
      align-items: stretch;
    }

    .card {
      background: linear-gradient(180deg, rgba(30, 41, 59, 0.96), rgba(15, 23, 42, 0.96));
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-inner { padding: 24px; }

    .section-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      color: var(--muted);
      text-transform: uppercase;
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      font-weight: 700;
    }

    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.12);
      color: var(--avg);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
    }

    .live-card {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 360px;
    }

    .live-speed-wrap {
      display: flex;
      align-items: flex-end;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .live-speed {
      font-size: clamp(4rem, 10vw, 6.5rem);
      line-height: 0.9;
      font-weight: 800;
      letter-spacing: -0.06em;
    }

    .live-unit {
      font-size: clamp(1.1rem, 2vw, 1.6rem);
      color: var(--muted);
      font-weight: 700;
      padding-bottom: 12px;
    }

    .live-details {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 20px;
      align-items: center;
      margin-top: 10px;
    }

    .compass {
      width: 120px;
      height: 120px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, rgba(56, 189, 248, 0.14), rgba(15, 23, 42, 0.55));
      border: 1px solid rgba(148, 163, 184, 0.2);
      display: grid;
      place-items: center;
      position: relative;
      flex-shrink: 0;
    }

    .compass::before,
    .compass::after {
      content: "";
      position: absolute;
      background: rgba(148, 163, 184, 0.12);
    }

    .compass::before { width: 1px; height: 80%; }
    .compass::after { height: 1px; width: 80%; }

    .compass-ring {
      position: absolute;
      inset: 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.16);
    }

    .arrow-wrap {
      width: 64px;
      height: 64px;
      transform: rotate(0deg);
      transition: transform 0.5s ease;
      z-index: 1;
    }

    .dir-label {
      font-size: clamp(1.25rem, 2.8vw, 2rem);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 18px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .meta-chip {
      background: rgba(148, 163, 184, 0.08);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 12px;
      padding: 10px 12px;
      min-width: 110px;
    }

    .meta-chip strong {
      display: block;
      color: var(--text);
      font-size: 1.1rem;
      margin-top: 2px;
    }

    .subtle {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .chart-card { min-height: 360px; }

    .chart-wrap {
      position: relative;
      height: 290px;
    }

    .chart-empty,
    .table-empty {
      display: grid;
      place-items: center;
      min-height: 220px;
      color: var(--muted);
      font-size: 1rem;
      text-align: center;
      border: 1px dashed rgba(148, 163, 184, 0.18);
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.35);
    }

    .table-card .card-inner { padding-bottom: 12px; }

    .table-scroll {
      overflow: auto;
      border-top: 1px solid rgba(148, 163, 184, 0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }

    th, td {
      padding: 16px 20px;
      text-align: left;
      border-bottom: 1px solid rgba(148, 163, 184, 0.08);
    }

    th {
      color: var(--muted);
      font-size: 0.84rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      background: rgba(15, 23, 42, 0.35);
      position: sticky;
      top: 0;
      backdrop-filter: blur(6px);
    }

    tbody tr { transition: background 0.18s ease; }
    tbody tr:hover { background: rgba(56, 189, 248, 0.05); }

    tbody tr.current {
      background: linear-gradient(90deg, rgba(56, 189, 248, 0.14), rgba(15, 23, 42, 0));
    }

    .value-avg { color: var(--avg); font-weight: 700; }
    .value-gust { color: var(--gust); font-weight: 700; }
    .trend {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
    }

    .trend.up { color: var(--good); }
    .trend.down { color: var(--down); }
    .trend.flat { color: var(--flat); }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .title-row h1 {
      margin: 0;
      font-size: clamp(1.2rem, 2vw, 1.7rem);
      letter-spacing: -0.03em;
    }

    .title-note {
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 980px) {
      .top-grid { grid-template-columns: 1fr; }
      .chart-wrap { height: 260px; }
    }

    @media (max-width: 640px) {
      .dashboard { padding: 14px; gap: 14px; }
      .card-inner { padding: 18px; }
      .live-details {
        grid-template-columns: 1fr;
        justify-items: start;
      }
      th, td { padding: 14px 14px; }
      table { min-width: 620px; }
    }
  </style>
</head>
<body>
  <main class="dashboard">
    <section class="top-grid">
      <article class="card live-card">
        <div class="card-inner">
          <div class="section-label">
            <span>Live Reading</span>
            <span class="badge">Updates every 5s</span>
          </div>

          <div class="live-speed-wrap">
            <div class="live-speed" id="liveSpeed">—</div>
            <div class="live-unit">mph</div>
          </div>

          <div class="live-details">
            <div class="compass" aria-label="Wind direction compass">
              <div class="compass-ring"></div>
              <div class="arrow-wrap" id="windArrow">
                <svg viewBox="0 0 100 100" width="64" height="64" aria-hidden="true">
                  <defs>
                    <linearGradient id="arrowGradient" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stop-color="#7dd3fc" />
                      <stop offset="100%" stop-color="#38bdf8" />
                    </linearGradient>
                  </defs>
                  <circle cx="50" cy="50" r="8" fill="#e2e8f0" opacity="0.85"></circle>
                  <path d="M50 8 L66 50 L50 42 L34 50 Z" fill="url(#arrowGradient)" stroke="#bae6fd" stroke-width="1.5" />
                  <path d="M50 92 L57 58 L50 63 L43 58 Z" fill="#475569" opacity="0.8" />
                </svg>
              </div>
            </div>

            <div>
              <div class="dir-label" id="dirLabel">Waiting for data...</div>
              <div class="meta-row">
                <div class="meta-chip">
                  Gust
                  <strong id="gustValue">—</strong>
                </div>
                <div class="meta-chip">
                  Temp
                  <strong id="tempValue">—</strong>
                </div>
                <div class="meta-chip">
                  Density Alt
                  <strong id="densityAltValue">—</strong>
                </div>
                <div class="meta-chip">
                  Pressure
                  <strong id="pressureValue">—</strong>
                </div>
              </div>
              <div class="subtle" id="updatedAgo">Last updated —</div>
            </div>
          </div>
        </div>
      </article>

      <article class="card chart-card">
        <div class="card-inner">
          <div class="title-row">
            <div>
              <div class="section-label" style="margin-bottom: 8px;">
                <span>Today's Wind Trend</span>
              </div>
              <h1>Avg Wind vs Gust</h1>
            </div>
            <div class="title-note" id="chartRange">Waiting for window data...</div>
          </div>
          <div id="chartState" class="chart-wrap">
            <canvas id="windChart"></canvas>
          </div>
        </div>
      </article>
    </section>

    <section class="card table-card">
      <div class="card-inner">
        <div class="title-row">
          <div>
            <div class="section-label" style="margin-bottom: 8px;">
              <span>30-Minute Windows</span>
            </div>
            <h1 style="margin:0;">Operational Wind Board</h1>
          </div>
          <div class="title-note" id="windowCount">No window data yet</div>
        </div>
      </div>
      <div class="table-scroll" id="tableContainer"></div>
    </section>
  </main>

  <script>
    const API_BASE = ''; // empty = same origin (nginx proxies /api/* to pi3)

    function cardinal(deg) {
      const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
      return dirs[Math.round(((deg % 360) + 360) % 360 / 22.5) % 16];
    }

    const state = {
      weather: null,
      windows: [],
      chart: null,
      lastWeatherFetch: null,
      weatherError: false,
      windowsError: false,
    };

    const el = {
      liveSpeed: document.getElementById('liveSpeed'),
      windArrow: document.getElementById('windArrow'),
      dirLabel: document.getElementById('dirLabel'),
      gustValue: document.getElementById('gustValue'),
      tempValue: document.getElementById('tempValue'),
      densityAltValue: document.getElementById('densityAltValue'),
      pressureValue: document.getElementById('pressureValue'),
      updatedAgo: document.getElementById('updatedAgo'),
      chartRange: document.getElementById('chartRange'),
      chartState: document.getElementById('chartState'),
      windChart: document.getElementById('windChart'),
      tableContainer: document.getElementById('tableContainer'),
      windowCount: document.getElementById('windowCount'),
    };

    const fmtInt = (value) => Number.isFinite(Number(value)) ? Math.round(Number(value)) : null;
    const fmtOne = (value) => Number.isFinite(Number(value)) ? Number(value).toFixed(1) : null;

    function safeDeg(value) {
      const num = Number(value);
      return Number.isFinite(num) ? ((num % 360) + 360) % 360 : null;
    }

    function formatDir(deg) {
      const normalized = safeDeg(deg);
      return normalized == null ? '—' : `${cardinal(normalized)} • ${Math.round(normalized)}°`;
    }

    function formatTimeRange(start, end) {
      const opts = { hour: 'numeric', minute: '2-digit' };
      return `${new Date(start).toLocaleTimeString([], opts)}–${new Date(end).toLocaleTimeString([], opts)}`;
    }

    function formatShortTime(dateLike) {
      return new Date(dateLike).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    }

    function timeSince(dateLike) {
      if (!dateLike) return 'Last updated —';
      const seconds = Math.max(0, Math.floor((Date.now() - new Date(dateLike).getTime()) / 1000));
      if (seconds < 60) return `Last updated ${seconds}s ago`;
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `Last updated ${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      return `Last updated ${hours}h ${minutes % 60}m ago`;
    }

    function getTrend(current, previous) {
      if (!Number.isFinite(current) || !Number.isFinite(previous)) {
        return { symbol: '→', label: 'steady', className: 'flat' };
      }
      const delta = current - previous;
      if (Math.abs(delta) <= 1) return { symbol: '→', label: 'steady', className: 'flat' };
      if (delta > 1) return { symbol: '↑', label: `${Math.round(delta)} mph`, className: 'up' };
      return { symbol: '↓', label: `${Math.round(Math.abs(delta))} mph`, className: 'down' };
    }

    async function fetchJson(url) {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    async function refreshWeather() {
      try {
        const data = await fetchJson(`${API_BASE}/api/weather`);
        state.weather = data;
        state.lastWeatherFetch = new Date();
        state.weatherError = false;
      } catch (error) {
        state.weatherError = true;
        console.error('Weather fetch failed:', error);
      }
      renderWeather();
    }

    async function refreshWindows() {
      try {
        const data = await fetchJson(`${API_BASE}/api/windows`);
        state.windows = Array.isArray(data) ? data : [];
        state.windowsError = false;
      } catch (error) {
        state.windowsError = true;
        console.error('Windows fetch failed:', error);
      }
      renderWindows();
      renderChart();
    }

    function renderWeather() {
      const weather = state.weather;
      const speed = fmtInt(weather?.windspeedmph);
      const gust = fmtInt(weather?.windgustmph);
      const windDir = safeDeg(weather?.winddir);
      const temp = fmtInt(weather?.tempf);
      const densityAlt = fmtInt(weather?.density_altitude_ft);
      const pressure = fmtOne(weather?.baromabsin);

      el.liveSpeed.textContent = speed == null ? '—' : `${speed}`;
      el.gustValue.textContent = gust == null ? '—' : `${gust} mph`;
      el.tempValue.textContent = temp == null ? '—' : `${temp}°F`;
      el.densityAltValue.textContent = densityAlt == null ? '—' : `${densityAlt.toLocaleString()} ft`;
      el.pressureValue.textContent = pressure == null ? '—' : `${pressure} inHg`;
      el.dirLabel.textContent = weather ? formatDir(windDir) : (state.weatherError ? 'Live data unavailable' : 'Waiting for data...');
      el.windArrow.style.transform = `rotate(${windDir ?? 0}deg)`;
      el.updatedAgo.textContent = timeSince(weather?.received_at || state.lastWeatherFetch);
    }

    function renderChart() {
      const windows = [...state.windows]
        .filter(w => w?.window_start && w?.window_end)
        .sort((a, b) => new Date(a.window_start) - new Date(b.window_start));

      if (!windows.length) {
        if (state.chart) {
          state.chart.destroy();
          state.chart = null;
        }
        el.chartState.innerHTML = '<div class="chart-empty">Waiting for data...</div>';
        el.chartRange.textContent = state.windowsError ? 'Window data unavailable' : 'Waiting for window data...';
        return;
      }

      if (!el.windChart || !document.getElementById('windChart')) {
        el.chartState.innerHTML = '<canvas id="windChart"></canvas>';
        el.windChart = document.getElementById('windChart');
      }

      const labels = windows.map(w => formatShortTime(w.window_start));
      const avgData = windows.map(w => Number(w.avg_windspeed_mph ?? null));
      const gustData = windows.map(w => Number(w.max_gust_mph ?? null));
      const start = windows[0].window_start;
      const end = windows[windows.length - 1].window_end;
      el.chartRange.textContent = `${formatShortTime(start)} to ${formatShortTime(end)}`;

      const config = {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: 'Avg Wind',
              data: avgData,
              borderColor: '#38bdf8',
              backgroundColor: 'rgba(56, 189, 248, 0.18)',
              pointRadius: 3,
              pointHoverRadius: 5,
              tension: 0.28,
              borderWidth: 3,
              fill: false,
            },
            {
              label: 'Gust',
              data: gustData,
              borderColor: '#fb923c',
              backgroundColor: 'rgba(251, 146, 60, 0.16)',
              pointRadius: 3,
              pointHoverRadius: 5,
              tension: 0.28,
              borderWidth: 3,
              fill: false,
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              labels: { color: '#cbd5e1', usePointStyle: true, boxWidth: 10, padding: 18 }
            },
            tooltip: {
              backgroundColor: 'rgba(15, 23, 42, 0.94)',
              borderColor: 'rgba(148,163,184,0.2)',
              borderWidth: 1,
              titleColor: '#e2e8f0',
              bodyColor: '#cbd5e1',
              callbacks: {
                label: (ctx) => `${ctx.dataset.label}: ${fmtOne(ctx.parsed.y) ?? '—'} mph`
              }
            }
          },
          scales: {
            x: {
              ticks: { color: '#94a3b8', maxRotation: 0, autoSkip: true },
              grid: { color: 'rgba(148, 163, 184, 0.08)' }
            },
            y: {
              beginAtZero: true,
              ticks: {
                color: '#94a3b8',
                callback: (value) => `${value} mph`
              },
              grid: { color: 'rgba(148, 163, 184, 0.08)' }
            }
          }
        }
      };

      if (state.chart) {
        state.chart.data = config.data;
        state.chart.options = config.options;
        state.chart.update();
      } else {
        state.chart = new Chart(el.windChart.getContext('2d'), config);
      }
    }

    function renderWindows() {
      const windows = [...state.windows]
        .filter(w => w?.window_start && w?.window_end)
        .sort((a, b) => new Date(b.window_start) - new Date(a.window_start));

      el.windowCount.textContent = windows.length
        ? `${windows.length} windows loaded`
        : (state.windowsError ? 'Window data unavailable' : 'No window data yet');

      if (!windows.length) {
        el.tableContainer.innerHTML = '<div class="table-empty">Waiting for data...</div>';
        return;
      }

      const chronological = [...windows].reverse();
      const prevMap = new Map();
      chronological.forEach((window, index) => {
        prevMap.set(window.window_start, chronological[index - 1] || null);
      });

      const rows = windows.map((window, index) => {
        const prev = prevMap.get(window.window_start);
        const avg = Number(window.avg_windspeed_mph);
        const gust = Number(window.max_gust_mph);
        const dir = safeDeg(window.avg_winddir);
        const trend = getTrend(avg, prev ? Number(prev.avg_windspeed_mph) : NaN);

        return `
          <tr class="${index === 0 ? 'current' : ''}">
            <td>${formatTimeRange(window.window_start, window.window_end)}</td>
            <td class="value-avg">${Number.isFinite(avg) ? `${Math.round(avg)} mph` : '—'}</td>
            <td class="value-gust">${Number.isFinite(gust) ? `${Math.round(gust)} mph` : '—'}</td>
            <td>${formatDir(dir)}</td>
            <td>
              <span class="trend ${trend.className}">${trend.symbol} ${trend.label}</span>
            </td>
          </tr>`;
      }).join('');

      el.tableContainer.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Avg</th>
              <th>Gust</th>
              <th>Direction</th>
              <th>Trend</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function startUpdatedTicker() {
      renderWeather();
      setInterval(() => renderWeather(), 1000);
    }

    async function init() {
      renderWeather();
      renderWindows();
      await Promise.all([refreshWeather(), refreshWindows()]);
      setInterval(refreshWeather, 5000);
      setInterval(refreshWindows, 30000);
      startUpdatedTicker();
    }

    init();
  </script>
</body>
</html>
