server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Weather - proxy to adsbpi via Tailscale (console data source)
    location /api/weather {
        proxy_pass http://100.92.158.48:4000/api/weather;
        proxy_http_version 1.1;
        proxy_set_header Host adsbpi;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }

    # Windows - served by local Node backend
    location /api/windows {
        proxy_pass http://127.0.0.1:3000/api/windows;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }
}
