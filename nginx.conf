server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy weather API to pi3 via Tailscale (server-side only, users never touch Tailscale)
    location /api/ {
        proxy_pass http://100.118.177.49:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host pi3;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }
}
